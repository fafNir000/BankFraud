services:
  # 1. Координатор для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: fraud_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 2. Брокер Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: fraud_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Настройка портов: 29092 для внутренней сети Докера, 9092 для внешнего мира (твоего ПК)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. База данных PostgreSQL
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password   # Убедись, что этот же пароль указан в скриптах!
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 4. Генератор транзакций
  generator:
    image: python:3.11-slim
    container_name: fraud_generator
    depends_on:
      - kafka
    volumes:
      - .:/app
    working_dir: /app
    # Так как генератор внутри Докера, он отправляет данные на kafka:29092 (проверь это в scripts/generator.py!)
    command: sh -c "pip install confluent-kafka pandas && python scripts/generator.py"

  # 5. Сайт-Дашборд на Streamlit
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fraud_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - kafka
    volumes:
      - .:/app

volumes:
  postgres_data: