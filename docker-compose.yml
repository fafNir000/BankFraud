services:
  # 1. Координатор для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: fraud_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 2. Брокер сообщений Kafka
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: fraud_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. База данных PostgreSQL
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 4. Генератор транзакций
  generator:
    image: python:3.11-slim
    container_name: fraud_generator
    depends_on:
      - kafka
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install confluent-kafka pandas && python scripts/1_generator.py"

  # 5. Обработчик потока на PySpark (ПЕРЕШЛИ НА ОФИЦИАЛЬНЫЙ ОБРАЗ APACHE)
  spark-processor:
    image: apache/spark:3.5.0-python3
    container_name: fraud_spark_processor
    depends_on:
      - kafka
      - postgres
    volumes:
      - .:/app
    working_dir: /app
    # Запускаем скрипт сразу через spark-submit. Зависимости (joblib, sklearn) мы подтянем динамически!
    command: >
      spark-submit 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.6.0
      scripts/3_spark_processor.py

  # 6. Сайт-Дашборд на Streamlit
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fraud_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - kafka
    volumes:
      - .:/app

volumes:
  postgres_data: